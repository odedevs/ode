name: 🚧🪟 Build on Windows

on:
  push:
    paths-ignore:
      - '**.md'
      - '**.txt'
  pull_request:
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        compiler: [msvc]

    steps:
    - name: '🧰 Checkout'
      uses: actions/checkout@v6

    - name: '🔄 Update Visual Studio'
      shell: pwsh
      run: |
        & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe" update --installPath "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise" --quiet --wait

    - name: '⚙️ Configure CMake'
      shell: pwsh
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DODE_WITH_DEMOS=OFF

    - name: '🔨 Build'
      shell: pwsh
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --parallel $env:NUMBER_OF_PROCESSORS

    - name: '🧪 Run Tests'
      shell: pwsh
      run: |
        cd ${{github.workspace}}/build
        ctest --output-on-failure --verbose -C ${{env.BUILD_TYPE}}
