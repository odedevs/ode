name: 🚧🍎 Build on macOS

on:
  push:
    paths-ignore:
      - '**.md'
      - '**.txt'
  pull_request:
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: macos-latest
    name: 🚧🍎 clang

    steps:
    - name: '🧰 Checkout'
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: '📦 Install dependencies'
      run: |
        brew update
        brew install cmake

    - name: '🛠️ Set up Clang'
      run: |
        echo "CC=clang" >> $GITHUB_ENV
        echo "CXX=clang++" >> $GITHUB_ENV

    - name: '⚙️ Configure CMake'
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DODE_WITH_DEMOS=OFF

    - name: '🔨 Build'
      run: cmake --build build --parallel "$(sysctl -n hw.ncpu)"

    - name: '🧪 Run Tests'
      run: ctest --test-dir build --output-on-failure
